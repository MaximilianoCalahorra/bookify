<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Descubrí nuestra amplia selección de libros de una gran variedad de géneros."
    />
    <meta
      name="keywords"
      content="libros, clasicos, fantasia, sci-fi, novelas, misterio, terror, ciencia"
    />
    <meta name="author" content="Maximiliano Calahorra" />
    <meta name="robots" content="index, follow" />
    <!-- Ícono pestaña -->
    <link rel="icon" href="assets/img/logo-icono.ico" type="image/x-icon" />
    <title>Bookify | E-Commerce de Libros</title>
  </head>
  <body>
    <!-- Encabezado y Navegación -->
    <header class="main-header">
      <div class="logo-container">
        <a href="#inicio">
          <img
            src="assets/img/logo.jpg"
            alt="Bookify - Tu librería online"
            class="logo"
          />
        </a>
      </div>
      <nav class="main-nav">
        <ul class="nav-list">
          <li><a href="#inicio">Inicio</a></li>
          <li><a href="#productos">Productos</a></li>
          <li><a href="#resenias">Reseñas</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <!-- Contenido Principal -->
    <main>
      <!-- Sección Inicio -->
      <section id="inicio" class="hero-section">
        <div class="hero-content">
          <h1>Tu próxima lectura te está esperando</h1>
          <p>Explorá nuestro catálogo y encontrá historias que atrapan.</p>
        </div>

        <div class="media-container">
          <img
            src="assets/img/hero-books.jpg"
            alt="Biblioteca con libros de fondo"
            class="hero-image"
          />
        </div>
      </section>

      <!-- Sección Productos -->
      <section id="productos" class="products-section"></section>

      <!-- Sección Reseñas -->
      <section id="resenias" class="reviews-section"></section>

      <!-- Sección Contacto -->
      <section id="contacto" class="contact-section"></section>
    </main>

    <!-- Pie de página -->
    <footer class="main-footer">
      <p>&copy; 2026 Bookify. Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
